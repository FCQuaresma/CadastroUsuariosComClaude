<div class="min-h-screen bg-neutral-100 p-4">
  <div class="flex justify-content-between align-items-center mb-4">
    <div class="text-900 text-2xl font-medium">Usuários</div>
    <div class="flex align-items-center gap-3">
      <span class="text-600">{{ authService.getRole() }}</span>
      <button pButton type="button" label="Sair" icon="pi pi-sign-out" class="p-button-text" (click)="logout()"></button>
    </div>
  </div>

  <div class="surface-card p-4 shadow-2 border-round">
    <div class="flex justify-content-end mb-3" *ngIf="authService.getRole() === 'Admin'">
      <button pButton type="button" label="Novo usuário" icon="pi pi-plus" routerLink="/users/new"></button>
    </div>

    <p-table
      [value]="usuarios"
      [lazy]="true"
      (onLazyLoad)="carregar($event)"
      [paginator]="true"
      [rows]="pageSize"
      [totalRecords]="totalRegistros"
      [loading]="carregando"
      dataKey="id"
    >
      <ng-template pTemplate="header">
        <tr>
          <th>Nome</th>
          <th>Email</th>
          <th>Role</th>
          <th>Status</th>
          <th *ngIf="authService.getRole() === 'Admin'">Ações</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-usuario>
        <tr>
          <td>{{ usuario.nome }}</td>
          <td>{{ usuario.email }}</td>
          <td>{{ usuario.role }}</td>
          <td>
            <p-tag [severity]="usuario.ativo ? 'success' : 'danger'" [value]="usuario.ativo ? 'Ativo' : 'Inativo'"></p-tag>
          </td>
          <td *ngIf="authService.getRole() === 'Admin'">
            <button pButton type="button" icon="pi pi-pencil" class="p-button-text" [routerLink]="['/users/edit', usuario.id]"></button>
            <button pButton type="button" icon="pi pi-trash" class="p-button-text p-button-danger" (click)="confirmarInativacao(usuario)"></button>
          </td>
        </tr>
      </ng-template>
      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="5">Nenhum usuário encontrado.</td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</div>
